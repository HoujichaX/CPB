name: Build CPB

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2

    - name: Build CPB
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        call build.bat

    - name: Verify binaries
      shell: cmd
      run: |
        if exist cpb.exe (echo cpb.exe OK) else (echo MISSING cpb.exe & exit /b 1)
        if exist cpb_train.exe (echo cpb_train.exe OK) else (echo MISSING cpb_train.exe & exit /b 1)
        if exist cpb_reader.exe (echo cpb_reader.exe OK) else (echo MISSING cpb_reader.exe & exit /b 1)

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cpb-windows-x64
        path: |
          cpb.exe
          cpb_train.exe
          cpb_reader.exe
